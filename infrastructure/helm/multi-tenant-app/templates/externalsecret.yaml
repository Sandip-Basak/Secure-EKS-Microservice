# ==========================================
# 1. The Bridge: AWS Secrets Manager Authentication Store
# ==========================================
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager-store
  labels:
    {{- include "multi-tenant-app.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.global.awsRegion | default "us-east-1" }}
      # This points to the secure IRSA service account we will provision via Terraform/EKS
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "multi-tenant-app.fullname" . }}-eso-sa
---
# ==========================================
# 2. The Blueprint: Synchronizing the Managed DB Payload
# ==========================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: django-db-credentials
  labels:
    {{- include "multi-tenant-app.labels" . | nindent 4 }}
spec:
  refreshInterval: "1h" # Dynamic synchronization window for automated rotation audits
  secretStoreRef:
    name: aws-secrets-manager-store
    kind: SecretStore
  target:
    name: django-db-secret # The native Kubernetes Secret name that will be automatically generated
    creationPolicy: Owner
  data:
    # Explicit mapping of JSON keys directly matching what our Terraform data layer generated
    - secretKey: DB_HOST
      remoteRef:
        key: {{ .Values.global.environment }}-mysql-rds-credentials
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: {{ .Values.global.environment }}-mysql-rds-credentials
        property: port
    - secretKey: DB_USER
      remoteRef:
        key: {{ .Values.global.environment }}-mysql-rds-credentials
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.global.environment }}-mysql-rds-credentials
        property: password
    - secretKey: DB_NAME
      remoteRef:
        key: {{ .Values.global.environment }}-mysql-rds-credentials
        property: database