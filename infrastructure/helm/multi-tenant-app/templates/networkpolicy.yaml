# ==========================================
# 1. Isolation Baseline: Default-Deny All Namespace Traffic
# ==========================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Release.Namespace | default "default" }}
spec:
  podSelector: {} # Targets every pod in the namespace
  policyTypes:
    - Ingress
    - Egress
---
# ==========================================
# 2. Frontend Layer: Serves Static Assets & Proxies API Calls
# ==========================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-isolation-policy
  namespace: {{ .Release.Namespace | default "default" }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow the external AWS ALB Ingress Controller to deliver public user traffic
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Core Requirement: Allow Frontend Nginx to resolve Internal Cluster DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow Frontend Nginx to reverse-proxy traffic down to the Node.js Gateway
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gateway
      ports:
        - protocol: TCP
          port: 3000
---
# ==========================================
# 3. Gateway Layer: Handles Auth & Downstream Routing
# ==========================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-routing-policy
  namespace: {{ .Release.Namespace | default "default" }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow Gateway to resolve Internal Cluster DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow Gateway to route authenticated requests to the Django Backend
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
      ports:
        - protocol: TCP
          port: 8000
---
# ==========================================
# 4. Core Logic Layer: Django Engine Locked to Gateway & DB
# ==========================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: core-backend-isolation-policy
  namespace: {{ .Release.Namespace | default "default" }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gateway
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow Django to resolve Internal Cluster DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # FIXED: Allow Django to egress to the internal AWS VPC CIDR block for RDS & Redis
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16